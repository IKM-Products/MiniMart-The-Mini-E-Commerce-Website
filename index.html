<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniMart | Purple Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo-container" onclick="location.reload()">
                <div class="logo-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="genuine-logo">
                        <path d="M6 2L3 6V20C3 20.5304 3.21071 21.0391 3.58579 21.4142C3.96086 21.7893 4.46957 22 5 22H19C19.5304 22 20.0391 21.7893 20.4142 21.4142C20.7893 21.0391 21 20.5304 21 20V6L18 2H6Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M3 6H21" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M16 10C16 11.0609 15.5786 12.0783 14.8284 12.8284C14.0783 13.5786 13.0609 14 12 14C10.9391 14 9.92172 13.5786 9.17157 12.8284C8.42143 12.0783 8 11.0609 8 10" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h1 class="logo-text">MiniMart</h1>
            </div>

            <div class="search-container">
                <input type="text" id="search-bar" placeholder="Search for products..." onkeyup="filterProducts()">
                <button class="search-btn">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="20" height="20">
                        <path d="M11 19C15.4183 19 19 15.4183 19 11C19 6.58172 15.4183 3 11 3C6.58172 3 3 6.58172 3 11C3 15.4183 6.58172 19 11 19Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M21 21L16.65 16.65" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>

            <div class="nav-right">
                <div class="cart-icon" onclick="toggleCart()">
                    <span class="cart-label">🛒 Cart</span>
                    <span id="cart-count">0</span>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="categories-section">
            <h2 class="section-heading">Categories</h2>
            <div id="category-icons-grid" class="category-icons-grid">
                </div>
        </section>

        <div class="gray-spacer"></div>

        <section class="products-section">
            <h2 class="section-heading">Just For You</h2>
            <div id="just-for-you-grid" class="product-grid">
                </div>
        </section>
    </main>

    <div id="cart-drawer" class="cart-drawer">
        <div class="cart-header">
            <h2>Your Cart</h2>
            <button onclick="toggleCart()">×</button>
        </div>
        <div id="cart-items">
            </div>
        <div class="cart-footer">
            <h3>Total: $<span id="cart-total">0</span></h3>
            <button class="checkout-btn" onclick="processCheckout()">Checkout</button>
        </div>
    </div>

    <div id="overlay" onclick="toggleCart()"></div>

    <script src="script.js"></script>
</body>
</html>
